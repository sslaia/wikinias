name: wikinias
description: An app for Nias Wikipedia, Wiktionary and Wikibooks

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.3.0+3

environment:
  sdk: ">=2.17.1 <3.0.0"

dependencies:
  connectivity_plus: ^2.3.0
  easy_localization: ^3.0.1
  flutter:
    sdk: flutter
  google_fonts: ^3.0.1
  internet_connection_checker: ^0.0.1+4
  provider: ^6.0.3
  shared_preferences: ^2.0.15
  webview_flutter: ^3.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
#    - assets/icons/
    - assets/images/
    - assets/translations/en.json
    - assets/translations/id.json
