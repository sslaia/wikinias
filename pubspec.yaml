name: wikinias
description: An app for Nias Wikipedia, Wiktionary and Wikibooks

publish_to: 'none'

version: 1.4.0+6

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  easy_localization: ^3.0.1
  flutter:
    sdk: flutter
  google_fonts: ^5.0.0
  provider: ^6.0.5
  shared_preferences: ^2.1.2
  webview_flutter: ^4.2.2
  webview_flutter_android: ^3.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/translations/en.json
    - assets/translations/id.json